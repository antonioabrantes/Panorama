{% extends 'base.html' %}
{% load static %}
{% block 'body' %}

<main class="mx-auto max-w-2xl px-4 py-16 sm:px-6 lg:px-8">
    <div class="shadow-xs ring-1 ring-gray-900/5 sm:rounded-lg sm:px-8 sm:pb-14 xl:px-16 xl:pt-16 xl:pb-20 bg-white">
        <div class="flex items-center justify-between mb-8">
            <h2 class="text-base font-semibold text-gray-900">Adicionar documento em
                {{ cliente.numero|default:cliente.nome }}</h2>
            <a href="{% url 'cliente' cliente.id %}"
                class="text-sm font-medium text-indigo-600 hover:text-indigo-500">Voltar para o processo</a>
        </div>

        <form class="space-y-6" action="{% url 'novo_documento' cliente.id %}" method="POST"
            enctype="multipart/form-data">
            {% csrf_token %}
            <div>
                <label for="documento" class="block text-sm/6 font-medium text-gray-900 mb-2">Documento</label>
                <div class="mt-2 flex justify-center rounded-lg border border-dashed border-gray-900/25 px-6 py-10">
                    <div class="text-center">
                        <svg class="mx-auto h-12 w-12 text-gray-300" viewBox="0 0 24 24" fill="currentColor"
                            aria-hidden="true">
                            <path fill-rule="evenodd"
                                d="M1.5 6a2.25 2.25 0 0 1 2.25-2.25h16.5A2.25 2.25 0 0 1 22.5 6v12a2.25 2.25 0 0 1-2.25 2.25H3.75A2.25 2.25 0 0 1 1.5 18V6ZM3 16.06V18c0 .414.336.75.75.75h16.5A.75.75 0 0 0 21 18v-1.94l-2.69-2.689a1.5 1.5 0 0 0-2.12 0l-.88.879.97.97a.75.75 0 1 1-1.06 1.06l-5.16-5.159a1.5 1.5 0 0 0-2.12 0L3 16.06Zm10.125-7.81a1.125 1.125 0 1 1 2.25 0 1.125 1.125 0 0 1-2.25 0Z"
                                clip-rule="evenodd" />
                        </svg>
                        <div class="mt-4 flex text-sm/6 leading-6 text-gray-600">
                            <label for="documento"
                                class="relative cursor-pointer rounded-md font-semibold text-indigo-600 focus-within:outline-2 focus-within:outline-offset-2 focus-within:outline-indigo-600">
                                <span>Enviar um arquivo</span>
                                <input id="documento" name="documento" type="file" class="sr-only"
                                    accept=".pdf,.doc,.docx,.jpg,.jpeg,.png" required />
                            </label>
                            <p class="pl-1">ou arraste e solte</p>
                        </div>
                        <p class="text-xs leading-5 text-gray-600">PDF, DOC, DOCX, JPG, PNG até 10MB</p>
                    </div>
                </div>
            </div>

            <div>
                <label for="data" class="block text-sm/6 font-medium text-gray-900 mb-2">Data</label>
                <input type="date" id="data" name="data" required
                    class="block w-full rounded-md bg-white px-3 py-1.5 text-base text-gray-900 outline-1 -outline-offset-1 outline-gray-300 placeholder:text-gray-400 focus:outline-2 focus:-outline-offset-2 focus:outline-indigo-600 sm:text-sm/6" />
            </div>

            <div>
                <label for="tipo" class="block text-sm/6 font-medium text-gray-900 mb-2">Tipo</label>
                <select id="tipo" name="tipo" required
                    class="block w-full rounded-md bg-white px-3 py-1.5 text-base text-gray-900 outline-1 -outline-offset-1 outline-gray-300 focus:outline-2 focus:-outline-offset-2 focus:outline-indigo-600 sm:text-sm/6">
                    <option value="">Selecione um tipo</option>
                    <option value="6.1">exigência (6.1)</option>
                    <option value="7.1">ciência de parecer (7.1)</option>
                    <option value="200">depósito (200)</option>
                    <option value="203">exame (203)</option>
                    <option value="207">cumprimento exigência (207)</option>
                    <option value="260">outras petições (260)</option>
                    <option value="281">manifestação (281)</option>
                    <option value="9.2">indeferimento (9.2)</option>
                    <option value="214">recurso (214)</option>
                    <option value="121">recurso exigência (121)</option>
                    <option value="280">cumprimento exigência (280)</option>
                    <option value="111">recurso negado (111)</option>
                    <option value="100.1">recurso provido-reforma (100.1)</option>
                    <option value="100.2">recurso provido-devolução (100.2)</option>
                    <option value="130">recurso prejudicado (130)</option>
                </select>
            </div>

            <div class="flex justify-end gap-3 pt-4">
                <a href="{% url 'cliente' cliente.id %}"
                    class="rounded-md bg-white px-3 py-2 text-sm/6 font-semibold text-gray-900 shadow-xs inset-ring-1 inset-ring-gray-300 hover:bg-gray-50">
                    Cancelar
                </a>
                <button type="submit"
                    class="rounded-md bg-indigo-600 px-3 py-2 text-sm/6 font-semibold text-white shadow-xs hover:bg-indigo-500 focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-indigo-600">
                    Salvar
                </button>
            </div>
        </form>
    </div>
</main>

{% endblock 'body' %}
